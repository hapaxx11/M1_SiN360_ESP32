name: Build and Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        run: |
          VERSION=$(cat version.txt 2>/dev/null | tr -d '[:space:]')
          VERSION="${VERSION:-1.0.0}"

          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: version.txt must contain a version in MAJOR.MINOR.PATCH format (e.g. 1.2.3), got: '$VERSION'"
            exit 1
          fi
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          case "${{ github.event.inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            *)     PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "$NEW_VERSION" > version.txt
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to version $NEW_VERSION"

      - name: Patch libnet80211 (deauth support)
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          tools/patch-libnet80211.sh

      - name: Build firmware
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          idf.py build

      - name: Create merged binary
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          esptool.py --chip esp32c6 merge_bin \
            -o "build/m1_esp32_v${{ steps.version.outputs.version }}.bin" \
            0x0     build/bootloader/bootloader.bin \
            0x8000  build/partition_table/partition-table.bin \
            0x10000 build/m1_esp32.bin

      - name: Commit version bump and push tag
        run: |
          git add version.txt
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin HEAD
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          python3 <<'PYEOF'
          import json
          import os
          import urllib.request

          version = os.environ["VERSION"]
          tag = os.environ["TAG"]
          repo = os.environ["REPO"]
          token = os.environ["GITHUB_TOKEN"]

          body = (
              f"## M1 SiN360 ESP32 Firmware {version}\n\n"
              "Built automatically via GitHub Actions.\n\n"
              "### Flash merged binary (recommended)\n"
              "```\n"
              f"esptool.py --chip esp32c6 write_flash 0x0 m1_esp32_v{version}.bin\n"
              "```\n\n"
              "### Individual binaries\n"
              "| File | Address |\n"
              "|------|---------|\n"
              "| `bootloader.bin` | `0x0` |\n"
              "| `partition-table.bin` | `0x8000` |\n"
              "| `m1_esp32.bin` | `0x10000` |\n"
          )

          payload = json.dumps({
              "tag_name": tag,
              "name": f"Release {version}",
              "body": body,
              "draft": False,
              "prerelease": False,
          }).encode()

          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/releases",
              data=payload,
              method="POST",
              headers={
                  "Authorization": f"token {token}",
                  "Content-Type": "application/json",
                  "Accept": "application/vnd.github+json",
              },
          )

          with urllib.request.urlopen(req) as resp:
              release = json.loads(resp.read().decode())

          if "upload_url" not in release:
              raise RuntimeError(f"GitHub API did not return upload_url: {release}")

          upload_url = release["upload_url"].split("{")[0]

          files = [
              f"build/m1_esp32_v{version}.bin",
              "build/m1_esp32.bin",
              "build/bootloader/bootloader.bin",
              "build/partition_table/partition-table.bin",
          ]

          for file_path in files:
              name = os.path.basename(file_path)
              with open(file_path, "rb") as f:
                  data = f.read()

              upload_req = urllib.request.Request(
                  f"{upload_url}?name={name}",
                  data=data,
                  method="POST",
                  headers={
                      "Authorization": f"token {token}",
                      "Content-Type": "application/octet-stream",
                      "Accept": "application/vnd.github+json",
                  },
              )

              with urllib.request.urlopen(upload_req) as up_resp:
                  up_resp.read()
          PYEOF
